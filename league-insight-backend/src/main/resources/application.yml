server:
  port: 8080
  address: 127.0.0.1

spring:
  application:
    name: league-insight-backend

  # Jackson 配置
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

  # 虚拟线程支持 (JDK 21)
  threads:
    virtual:
      enabled: true

# 应用配置
app:
  settings:
    auto:
      start-match-switch: false
      start-match-delay: 0
      accept-match-switch: false
      accept-match-delay: 0
      pick-champion-switch: false
      ban-champion-switch: false
      pick-champion-slice: []
      ban-champion-slice: []
    ai:
      enabled: true
      api-key: "xxx"
      endpoint: "xxx"
      model: "xxx"

# 日志配置
logging:
  level:
    root: INFO
    com.ekko.insight: DEBUG
    org.java_websocket: WARN
  pattern:
    console: "[%d{HH:mm:ss.SSS}] [%thread] %-5level %logger{36} - %msg%n"