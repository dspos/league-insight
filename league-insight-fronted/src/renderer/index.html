<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/icon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws://127.0.0.1:8080 http://127.0.0.1:8080 https://127.0.0.1:* wss://127.0.0.1:*; img-src 'self' data: https: http://127.0.0.1:8080;">
    <title>LeagueInsight - 英雄联盟战绩查询工具</title>
    <script>
      // 在页面渲染前立即应用主题，防止闪烁
      (function() {
        const theme = localStorage.getItem('league-insight-theme') || 'dark'
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
